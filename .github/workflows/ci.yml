name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libx11-dev libxt-dev libgl1-mesa-dev xorg-dev

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          # Explicitly clone vcpkg, do not attempt to find submodule
          vcpkgGitCommitId: 'f310de9dc9f16bd016e06d6c9a1decc07a918273'
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          cmake -B build -S .
          -G "Visual Studio 17 2022"
          -A x64
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake"

      - name: Configure CMake (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: >
          cmake -B build -S .
          -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake"
          -DCMAKE_BUILD_TYPE=Release

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config Release

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: cmake --build build

      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Test (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: ctest --test-dir build --output-on-failure
