name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 4
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tools
        run: sudo apt-get update && sudo apt-get install -y clang-format cppcheck

      - name: Check Code Formatting
        continue-on-error: true
        run: |
          files=$(git ls-files '*.cpp' '*.cc' '*.cxx' '*.hpp' '*.h')
          [ -z "$files" ] && exit 0
          echo "$files" | xargs clang-format -style=file --dry-run --Werror || true

      - name: Static Analysis
        continue-on-error: true
        run: |
          cppcheck --error-exitcode=0 --enable=warning,performance \
            --suppress=missingIncludeSystem -I include/ src/

      - name: Check Version Consistency
        run: python3 scripts/check_version.py

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: quality
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: shuati-windows
          - os: ubuntu-latest
            artifact_name: shuati-linux
          - os: macos-latest
            artifact_name: shuati-macos

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev libx11-dev libxt-dev \
            libgl1-mesa-dev xorg-dev ninja-build

      - name: Install macOS Dependencies
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.31'

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -B build -S . `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_STANDARD=20

      - name: Build
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cmake --build build --config Release --parallel 4
          else
            cmake --build build --parallel 4
          fi

      - name: Test
        shell: bash
        run: ctest --test-dir build -C Release --output-on-failure --parallel 4

      - name: Package Artifacts
        shell: bash
        run: |
          mkdir -p release_pkg
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp build/Release/shuati.exe release_pkg/
            cp build/vcpkg_installed/x64-windows/bin/*.dll release_pkg/ 2>/dev/null || true
          else
            cp build/shuati release_pkg/
          fi
          [ -d resources ] && cp -r resources release_pkg/
          cp README.md LICENSE release_pkg/ 2>/dev/null || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release_pkg/*
          retention-days: 30
          if-no-files-found: error
