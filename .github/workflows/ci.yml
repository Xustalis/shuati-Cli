name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v1.4.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (optional)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Clang-Format
        continue-on-error: true
        shell: bash
        run: |
          files=$(git ls-files '*.cpp' '*.cc' '*.cxx' '*.hpp' '*.h')
          if [[ -z "$files" ]]; then
            echo "No C/C++ files found."
            exit 0
          fi
          clang-format -style=Google --dry-run --Werror $files

      - name: Clang-Tidy (optional)
        shell: bash
        run: |
          if ! command -v clang-tidy >/dev/null 2>&1; then
            echo "clang-tidy not found, skipping."
            exit 0
          fi
          echo "clang-tidy is available, but not configured for this repo; skipping."

  build:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        build_type: [Debug, RelWithDebInfo, Release]
        exclude:
          - os: macos-latest
            build_type: Debug
          - os: macos-latest
            build_type: RelWithDebInfo

    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 4
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libx11-dev libxt-dev libgl1-mesa-dev xorg-dev clang-format

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          # Explicitly clone vcpkg, do not attempt to find submodule
          vcpkgGitCommitId: 'f310de9dc9f16bd016e06d6c9a1decc07a918273'
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          cmake -B build -S .
          -G "Visual Studio 17 2022"
          -A x64
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake"

      - name: Configure CMake (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: >
          cmake -B build -S .
          -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake"
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        shell: bash
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Test
        shell: bash
        run: ctest --test-dir build -C ${{ matrix.build_type }} --output-on-failure

      - name: Prepare Release Artifact (Windows)
        if: runner.os == 'Windows' && matrix.build_type == 'Release'
        shell: pwsh
        run: |
          mkdir release_pkg
          copy build/Release/shuati.exe release_pkg/
          # Copy DLLs if needed (example)
          # copy build/vcpkg_installed/x64-windows/bin/*.dll release_pkg/

      - name: Prepare Release Artifact (Linux/macOS)
        if: runner.os != 'Windows' && matrix.build_type == 'Release'
        shell: bash
        run: |
          mkdir release_pkg
          cp build/shuati release_pkg/

      - name: Generate Checksum
        if: matrix.build_type == 'Release'
        shell: bash
        working-directory: release_pkg
        run: |
          # Determine filename based on OS
          if [ "${{ runner.os }}" == "Windows" ]; then
            FILE="shuati.exe"
          else
            FILE="shuati"
          fi
          
          # Generate checksum
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$FILE" > shuati-${{ runner.os }}.sha256
          elif command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "$FILE" > shuati-${{ runner.os }}.sha256
          else
            echo "No checksum tool found" > shuati-${{ runner.os }}.sha256
          fi

      - name: Upload Artifact
        if: matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: shuati-${{ runner.os }}-release
          path: release_pkg/*

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v1.4.')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/shuati-Windows-release/*
            artifacts/shuati-Linux-release/*
            artifacts/shuati-macOS-release/*
          generate_release_notes: true
          draft: false
          prerelease: false
