name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (optional)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Clang-Format
        continue-on-error: true
        shell: bash
        run: |
          files=$(git ls-files '*.cpp' '*.cc' '*.cxx' '*.hpp' '*.h')
          if [[ -z "$files" ]]; then
            echo "No C/C++ files found."
            exit 0
          fi
          clang-format -style=Google --dry-run --Werror $files

      - name: Clang-Tidy (optional)
        shell: bash
        run: |
          if ! command -v clang-tidy >/dev/null 2>&1; then
            echo "clang-tidy not found, skipping."
            exit 0
          fi
          echo "clang-tidy is available, but not configured for this repo; skipping."

  build:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        build_type: [Debug, RelWithDebInfo, Release]
        exclude:
          - os: macos-latest
            build_type: Debug
          - os: macos-latest
            build_type: RelWithDebInfo

    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 4
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libx11-dev libxt-dev libgl1-mesa-dev xorg-dev clang-format

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          # Explicitly clone vcpkg, do not attempt to find submodule
          vcpkgGitCommitId: 'f310de9dc9f16bd016e06d6c9a1decc07a918273'
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          cmake -B build -S .
          -G "Visual Studio 17 2022"
          -A x64
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake"

      - name: Configure CMake (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: >
          cmake -B build -S .
          -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake"
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: cmake --build build --parallel

      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ctest --test-dir build -C ${{ matrix.build_type }} --output-on-failure

      - name: Test (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: ctest --test-dir build --output-on-failure

      - name: Verify Artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "build/${{ matrix.build_type }}/shuati.exe" --help

      - name: Verify Artifact (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ./build/shuati --help

      - name: Upload Artifact
        if: runner.os == 'Windows' && matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: shuati-${{ runner.os }}-${{ matrix.build_type }}
          path: |
            build/Release/shuati.exe
            build/vcpkg_installed/x64-windows/bin/*.dll
