name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Release Assets
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure CMake
        shell: pwsh
        run: >
          cmake -B build -S .
          -G "Visual Studio 17 2022"
          -A x64
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release

      - name: Stage
        shell: pwsh
        run: |
          $dist = "dist"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Copy-Item -Force "build/Release/shuati.exe" "$dist/"
          Copy-Item -Force "install.ps1" "$dist/"
          Copy-Item -Force -Recurse "build/vcpkg_installed/x64-windows/bin/*" "$dist/"

      - name: Pack
        shell: pwsh
        run: |
          cd dist
          7z a ../shuati-windows-x64-${{ github.ref_name }}.zip *
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: shuati-windows-x64-${{ github.ref_name }}.zip
          generate_release_notes: true
