name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      publish:
        description: Create/update GitHub Release and upload assets
        type: boolean
        required: false
        default: true
      dry_run:
        description: Build artifacts only (skip release publish)
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  actions: write

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 4
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build_assets:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Validate Version Tag
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag must be vX.Y.Z, got: $tag"
            exit 1
          fi
          py=python3; command -v python3 >/dev/null 2>&1 || py=python
          cmake_ver="$($py -c "
          import re, pathlib
          txt = pathlib.Path('CMakeLists.txt').read_text(encoding='utf-8', errors='ignore')
          m = re.search(r'project\(shuati-cli\s+VERSION\s+([0-9]+\.[0-9]+\.[0-9]+)', txt)
          print(m.group(1) if m else '')
          " | tr -d '\r')"
          vcpkg_ver="$($py -c "
          import json, pathlib
          print(json.loads(pathlib.Path('vcpkg.json').read_text())['version-string'])
          " | tr -d '\r')"
          [[ "v$cmake_ver" == "$tag" ]] || { echo "::error::Tag $tag != CMake $cmake_ver"; exit 1; }
          [[ "$vcpkg_ver" == "$cmake_ver" ]] || { echo "::error::vcpkg $vcpkg_ver != CMake $cmake_ver"; exit 1; }

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libx11-dev libxt-dev libgl1-mesa-dev xorg-dev ninja-build

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.31'

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -B build -S . `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake"

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cmake --build build --config Release --parallel 4
          else
            cmake --build build --parallel 4
          fi

      - name: Test
        shell: bash
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Smoke Test
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            vcpkg_bin="$(find build/vcpkg_installed -path '*/bin' -type d 2>/dev/null | head -1)"
            [ -n "$vcpkg_bin" ] && export PATH="$vcpkg_bin:$PATH"
            build/Release/shuati.exe --help
            mkdir -p smoke && (cd smoke && ../build/Release/shuati.exe init)
          else
            ./build/shuati --help
            mkdir -p smoke && (cd smoke && ../build/shuati init)
          fi

      - name: Stage (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item -Force "build/Release/shuati.exe" dist/
          Copy-Item -Force "install.ps1" dist/
          Copy-Item -Force "README.md" dist/
          Copy-Item -Force "CHANGELOG.md" dist/
          Copy-Item -Force -Recurse "build/vcpkg_installed/x64-windows/bin/*" dist/ -ErrorAction SilentlyContinue
          if (Test-Path resources) { Copy-Item -Force -Recurse resources dist/ }

      - name: Stage (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp -f build/shuati dist/
          cp -f README.md CHANGELOG.md dist/ 2>/dev/null || true
          [ -d resources ] && cp -rf resources dist/
          cp -f install.sh dist/ 2>/dev/null || true

      - name: Pack Windows ZIP
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd dist
          7z a "../shuati-windows-x64-${{ github.ref_name }}.zip" *

      - name: Pack Windows Installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $ver = "${{ github.ref_name }}".TrimStart("v")
          $env:SHUATI_VERSION = $ver
          $env:SHUATI_OUTPUT_NAME = "shuati-setup-x64-${{ github.ref_name }}"
          $iscc = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) { throw "ISCC.exe not found at $iscc" }
          & $iscc "installer\shuati.iss" "/O."
          $expected = "shuati-setup-x64-${{ github.ref_name }}.exe"
          if (!(Test-Path $expected)) {
            throw "Installer not found: $expected"
          }
          Write-Host "Installer created: $expected"

      - name: Pack Linux DEB
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd build && cpack -G DEB
          cp *.deb ../ 2>/dev/null || echo "No .deb generated"

      - name: Pack Unix Tarball
        if: runner.os != 'Windows'
        shell: bash
        run: tar -czf "shuati-${{ runner.os }}-x64-${{ github.ref_name }}.tar.gz" -C dist .

      - name: Generate Checksums
        shell: bash
        run: |
          py=python3; command -v python3 >/dev/null 2>&1 || py=python
          for f in shuati-*.zip shuati-*.tar.gz shuati-setup-*.exe *.deb; do
            [ -f "$f" ] || continue
            $py -c "
          import hashlib, pathlib, sys
          f = pathlib.Path(sys.argv[1])
          h = hashlib.sha256(f.read_bytes()).hexdigest()
          pathlib.Path(str(f) + '.sha256').write_text(f'{h}  {f.name}\n')
          print(f'{h}  {f.name}')
          " "$f"
          done

      - name: Upload Assets (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: assets-Windows
          path: |
            shuati-windows-x64-${{ github.ref_name }}.zip
            shuati-windows-x64-${{ github.ref_name }}.zip.sha256
            shuati-setup-x64-${{ github.ref_name }}.exe
            shuati-setup-x64-${{ github.ref_name }}.exe.sha256

      - name: Upload Assets (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: assets-Linux
          path: |
            shuati-Linux-x64-${{ github.ref_name }}.tar.gz
            shuati-Linux-x64-${{ github.ref_name }}.tar.gz.sha256
            *.deb

  release:
    name: Publish Release
    needs: build_assets
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.ref, 'refs/tags/')
      && (github.event_name != 'workflow_dispatch' || github.event.inputs.publish == 'true')
      && (github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true')

    steps:
      - uses: actions/checkout@v4

      - name: Download All Assets
        uses: actions/download-artifact@v4
        with:
          pattern: assets-*
          merge-multiple: true

      - name: Build Release Notes
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          if [[ ! -f CHANGELOG.md ]]; then
            printf "## %s\n\n(CHANGELOG.md not found)\n" "$ver" > RELEASE_NOTES.md
            exit 0
          fi
          {
            printf "## %s\n\n" "$ver"
            awk -v ver="$ver" '
              $0 ~ "^## \\[" ver "\\]" || $0 ~ "^## \\[v" ver "\\]" {found=1; next}
              found && /^## \[/ {exit}
              found {print}
            ' CHANGELOG.md | sed 's/[[:space:]]*$//' | awk 'NF{p=1} p{print}'
            echo ""
          } > RELEASE_NOTES.md

      - name: Combine Checksums
        shell: bash
        run: cat *.sha256 > checksums.sha256

      - name: Create Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          shopt -s nullglob
          files=()
          for f in shuati-*.zip shuati-*.zip.sha256 \
                   shuati-setup-*.exe shuati-setup-*.exe.sha256 \
                   shuati-*-x64-*.tar.gz shuati-*-x64-*.tar.gz.sha256 \
                   *.deb checksums.sha256; do
            [ -f "$f" ] && files+=("$f")
          done

          echo "Files to upload:"
          printf '  %s\n' "${files[@]}"

          for i in 1 2 3; do
            if gh release view "$tag" >/dev/null 2>&1; then
              gh release edit "$tag" --notes-file RELEASE_NOTES.md
            else
              gh release create "$tag" --title "$tag" --notes-file RELEASE_NOTES.md
            fi
            gh release upload "$tag" "${files[@]}" --clobber && exit 0
            echo "Upload attempt $i failed, retrying..."
            sleep $((i * 5))
          done
          exit 1

      - name: Summary
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          {
            echo "### Release $tag"
            echo ""
            echo "- https://github.com/${GITHUB_REPOSITORY}/releases/tag/${tag}"
            echo ""
            echo '```'
            cat checksums.sha256
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
